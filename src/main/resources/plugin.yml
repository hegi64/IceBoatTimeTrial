name: IceBoatTimeTrial
version: '1.0.2'
main: com.hegi64.iceBoatTimeTrial.Main
api-version: '1.21'
prefix: [ IceBoatTimeTrial ]
authors: [ hegi64 ]
website: hegi64.com
depend: [ WorldEdit, FancyHolograms ]

commands:
  ibt:
    description: Ice boat time trial base command
    usage: /ibt <subcommand>
    aliases: [iceboattimetrial]
  icetrackeditor:
    description: Track editor command
    usage: /icetrackeditor <subcommand>
    aliases: [ite]

permissions:
  iceboat.admin:
    description: Access to all admin commands
    default: op
  iceboat.player:
    description: Access to player timing commands
    default: true
  iceboat.editor.use:
    description: Access to track editor command
    default: op
  iceboat.editor.modify:
    description: Modify tracks in editor mode
    default: op
  iceboat.editor.admin:
    description: Force editor operations and lock overrides
    default: op
